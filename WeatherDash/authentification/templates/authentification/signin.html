{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://img.icons8.com/?size=100&id=qA3w9Yp2vY7r&format=png&color=000000" type="image/x-icon">
    <title>Login to your account</title>
</head>
<style>
    * {
    margin: 0;
    padding: 0;
    left: 0;
    right: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-image: url("https://images.unsplash.com/photo-1720639128406-5197cb67169a?q=80&w=1074&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
    background-repeat: no-repeat;
    background-size: cover;
    background-color: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    display: flex;
    background-color: white;
    border-radius: 10px;
    overflow: hidden;
    width: 900px;
    max-width: 95%;
}

.form-container {
    padding: 40px;
    width: 50%;
}

.image-container {
    width: 50%;
    background-image: url('https://images.unsplash.com/photo-1534068731687-d70176c2e7d5?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
    background-size: cover;
}

h1 {
    font-size: 28px;
    margin-bottom:40px;
    color: #333;
    text-align: center;
}

.input-group {
    margin-bottom: 30px;
}

label {
    display: block;
    margin-bottom: 8px;
    color: #555;
}
input[type="text"],
input[type="email"],
input[type="password"] {
    width: 100%;
   padding: 15px;
    border: 1px solid #ddd;
    border-radius: 30px;
    font-size: 16px;
    outline: none;
    
}

input[type="email"]:focus,
input[type="text"]:focus,
input[type="password"]:focus {
    border-color: #000080;
}

.checkbox-group {
    display: flex;
    flex-direction: row;
    align-items: center;
    margin-bottom: 15px;
    margin-right: 10px;
}

.checkbox-group input {
    margin-right: 10px;
}

button {
    background-color: #000080;
    color: white;
    border: none;
    padding: 14px;
    border-radius: 30px;
    font-size: 16px;
    width: 100%;
    transition: background-color 0.3s;
}

button:hover {
    background-color: black;
}

.bottom-text {
    margin-top: 20px;
    text-align: center;
    color: #555;
}

.bottom-text a {
    color: #000080;
    text-decoration: none;
}

.bottom-text a:hover {
    text-decoration: underline;
}


@media (max-width: 768px) {
    .container {
        display: flex;
        flex-direction: column;
    }
    
    .form-container,
    .image-container {
        width: 100%;
    }
    
    .image-container {
        height: 200px;
    }
}
</style>
<body>
    <div class="container">
        <div class="form-container">
            <h1>Login Form</h1>
            <form method="POST" action="{% url 'signin' %}">
                {% csrf_token %}
                {% if messages %}
                {% for message in messages %}
                   {% if message.tags == 'success' %} 
                    <p style="color:green;">{{ message }}</p>
                    <script>
                        setTimeout(() => {
                            window.location.href = "{% url 'Home' %}";
                        }, 800);
                    </script>
                   {% else %}
                   <p style="color:red;">{{ message }}</p>
                   {% endif %}
                {% endfor %}
               {% endif %}
                <div class="input-group">
                    <label for="email">Email ou Username</label>
                    <input type="text" id="email" name="username" required placeholder="Email ou Username">
                </div>
                <div class="input-group">
                    <label for="password">password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <button type="submit">Login Now</button>
                <div class="bottom-text">
                    <p>Don't have an account?
                        <a href="{% url 'signup' %}">Signup</a>
                    </p><a href="#">Forgot password?</a></p>
                </div>
            </form>
            </div>
            <div class="image-container"></div>
        </div>
</body>
</html>
