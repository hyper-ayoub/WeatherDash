<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}WeatherDash{% endblock %}</title>
  <!-- Bootstrap 5 CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet"
  />
  <style>
    :root {
      --wd-primary: #1a73e8;
      --wd-bg: #0d1117;
      --wd-surface: #161b22;
      --wd-border: #30363d;
      --wd-text: #e6edf3;
      --wd-muted: #8b949e;
    }
    body {
      background-color: var(--wd-bg);
      color: var(--wd-text);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .navbar-brand span { color: var(--wd-primary); }
    .card {
      background-color: var(--wd-surface);
      border-color: var(--wd-border);
    }
    .card:hover { border-color: var(--wd-primary); transition: border-color .2s; }
    .zone-header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      border-radius: .5rem;
    }
    .weather-icon { width: 60px; height: 60px; }
    .temp-display { font-size: 2rem; font-weight: 700; }
    .badge-continent { font-size: .75rem; }
    footer { border-top: 1px solid var(--wd-border); }
    .text-muted { color: var(--wd-muted) !important; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-dark" style="background-color: var(--wd-surface); border-bottom: 1px solid var(--wd-border);">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'weather:dashboard' %}">
        <i class="bi bi-cloud-sun-fill me-2" style="color: var(--wd-primary);"></i>
        Weather<span>Dash</span>
      </a>
      <span class="text-muted small">
        <i class="bi bi-globe2 me-1"></i> Global World Zones
      </span>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-muted py-4 mt-4">
    <small>
      WeatherDash &mdash; Global World Zones &bull;
      Weather data from <a href="https://openweathermap.org" target="_blank" rel="noopener" class="text-muted">OpenWeatherMap</a>
    </small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
